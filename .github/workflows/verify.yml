name: verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  specimen-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: EXAMPLEmarbles/cabin/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Cabin's embedder (all-MiniLM-L6-v2, ~80 MB) downloads once, then caches.
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Install cabin dependencies
        run: pip install -r EXAMPLEmarbles/cabin/requirements.txt

      - name: Run all specimen suites
        run: bash verify_examples.sh
